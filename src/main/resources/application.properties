spring.application.name=backend


# Configuración de la URL de conexión 
spring.datasource.url=jdbc:mysql://mysql-bd-clinica-bdclinica.c.aivencloud.com:25687/bd_clinica?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales de acceso (usa las que pusiste al instalar MySQL)
spring.datasource.username=avnadmin
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Validación de constraints de BD al arrancar
spring.jpa.properties.javax.persistence.validation.mode=auto

# Paginación por defecto
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Clave secreta en Base64.
jwt.secret=TWlDbGF2ZVNlY3JldGFTdXBlclNlZ3VyYUNsaW5pY2FQcml2YWRhMjAyNg==
# Tiempo de expiración (10 horas)
jwt.expiration=36000000